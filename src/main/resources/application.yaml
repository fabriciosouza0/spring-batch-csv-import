server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 2MB

spring:
  application:
    name: spring-batch-csv-import
  main:
    allow-bean-definition-overriding: true
    web-application-type: servlet
    banner-mode: off
  sql:
    init:
      # Mude para always na primeira run, para gerar as tabelas de log (mude para never após isso)
      # Cria as tabelas automaticamente localmente, gere o sql das tabelas criadas e cole eles na pasta de migrations (ambiente alto apenas por migrations)
      mode: never
      # Força a execução do script oficial de tabelas do Spring Batch para o Postgres
      schema-locations: classpath:org/springframework/batch/core/schema-postgresql.sql
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/${spring.application.name}
    username: postgres
    password: postgres

logging:
  level:
    root: info
    br.ativosdigital.tributalizaapi.repository.http.apibrasil.cnpj.CnpjApiRepository: DEBUG
    feign: DEBUG